<!DOCTYPE html>
<html>
<head>
    <title>Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <script>
        // ใส่ Peer ID ของ "อชิ" ที่ได้จากหน้า monitor
        const achiID = 'ACHI_MONITOR_001'; 

        const peer = new Peer();

        navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
            // เมื่อเชื่อมต่อกับ Server สำเร็จ ให้โทรหาเครื่องอชิทันที
            peer.on('open', (id) => {
                peer.call(achiID, stream);
            });
        });
    </script>
</body>
</html>
