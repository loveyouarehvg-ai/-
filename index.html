<!DOCTYPE html>
<html>
<head>
    <title>LIVE STREAM 4:3</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        
        /* ล็อกขนาดจอวิดีโอเป็น 4:3 */
        .video-container {
            position: relative;
            width: 80vh; /* ปรับขนาดตามความสูงจอ */
            aspect-ratio: 4 / 3;
            background: #111;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ให้ภาพเต็มกรอบ 4:3 */
            transform: scaleX(-1); /* กลับด้านกระจกให้ดูเป็นธรรมชาติ */
        }

        .overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        #status {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="overlay">● LIVE 4:3 HD</div>
        <video id="remote-video" autoplay playsinline></video>
        <div id="status">WAITING FOR CONNECTION...</div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        const remoteVideo = document.getElementById('remote-video');
        const status = document.getElementById('status');
        
        const peer = new Peer(); 

        peer.on('open', (id) => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('call');
            
            if (targetId) {
                // ส่วนของเพื่อน: ส่งกล้องไปหาเรา
                startMyCam(targetId);
            } else {
                // ส่วนของเรา: รอรับกล้องจากเพื่อน
                status.innerText = "YOUR ID: " + id;
                console.log("Link to share: " + window.location.href + "?call=" + id);
            }
        });

        async function startMyCam(targetId) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { aspectRatio: 1.333, width: 640, height: 480 } 
                });
                remoteVideo.srcObject = stream; // เพื่อนเห็นหน้าตัวเอง
                peer.call(targetId, stream);    // ส่งภาพมาให้เรา
                status.innerText = "STREAMING TO MASTER...";
            } catch (err) {
                status.innerText = "CAMERA ERROR: " + err.message;
            }
        }

        // เมื่อมีคนโทรเข้ามา (เราเป็นคนรับภาพ)
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                remoteVideo.srcObject = remoteStream; // เราเห็นหน้าเพื่อน
                status.innerText = "CONNECTED - RECEIVING FEED";
            });
        });
    </script>
</body>
</html>
